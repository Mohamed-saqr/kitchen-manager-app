name: kitchen_manager_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  firebase_core: ^3.0.0
  firebase_storage: ^12.0.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.0
  youtube_player_flutter: ^9.1.1
  photo_view: ^0.15.0
  flutter_pdfview: ^1.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^8.0.0
  open_filex: ^4.5.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  dartz: ^0.10.1
  get_it: ^7.6.0
  google_sign_in: ^6.2.1
  intl_phone_field: ^3.2.0
  video_thumbnail: 0.5.6
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  firebase_app_check: ^0.3.2+10
  flutter_native_splash: ^2.4.7
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3        # ← ضيف السطر ده

flutter:
  assets:
    - assets/images/logo.png
    - assets/translations/
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"    # ← اللون الأبيض
  adaptive_icon_foreground: "assets/images/logo.png"